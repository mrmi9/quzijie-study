name: verify

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://quzijie:Ci-Db-74_Battery@localhost:5432/quzijie_dev?schema=public
      TEST_DATABASE_URL: postgresql://quzijie:Ci-Db-74_Battery@localhost:5432/quzijie_test?schema=public
      JWT_ACCESS_SECRET: ci-access-secret-with-at-least-thirty-two-characters
      WECHAT_AUTH_MODE: stub
      WECHAT_DEV_OPENID: ci-openid
      NODE_ENV: test
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: quzijie
          POSTGRES_PASSWORD: Ci-Db-74_Battery
          POSTGRES_DB: quzijie_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U quzijie -d quzijie_dev"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20

    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: npm
      - run: npm ci
      - name: Validate deployment definitions
        env:
          QUIZIJIE_API_ENV_FILE: server/.env.example
          QUIZIJIE_API_IMAGE: ghcr.io/example/quzijie-api:ci
          QUIZIJIE_MIGRATE_IMAGE: ghcr.io/example/quzijie-api-migrate:ci
        run: |
          bash -n ops/*.sh
          docker compose -f compose.release.yaml config --quiet
      - name: Create test database
        env:
          PGPASSWORD: Ci-Db-74_Battery
        run: psql -h localhost -U quzijie -d quzijie_dev -c 'CREATE DATABASE quzijie_test'
      - name: Apply development migrations
        run: npm run db:deploy --workspace server
      - name: Import question bank
        run: npm run server:db:seed
      - name: Verify application
        run: npm run verify:all
      - name: Build deployment images
        run: |
          docker build --tag quzijie-api:ci .
          docker build --target migration --tag quzijie-api-migrate:ci .
      - name: Smoke deployment images
        run: |
          set -euo pipefail
          docker run --rm --network host --env DATABASE_URL quzijie-api-migrate:ci
          docker run --rm --network host --env DATABASE_URL quzijie-api-migrate:ci npm run db:seed:compiled --workspace server
          container=quzijie-api-ci
          cleanup() {
            status=$?
            if [ "$status" -ne 0 ]; then
              docker logs "$container" 2>&1 || true
              docker inspect --format '{{json .State}}' "$container" 2>&1 || true
            fi
            docker rm -f "$container" >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run --detach --name "$container" --network host \
            --env DATABASE_URL \
            --env JWT_ACCESS_SECRET \
            --env NODE_ENV=production \
            --env WECHAT_AUTH_MODE=real \
            --env WECHAT_APP_ID=ci-app-id \
            --env WECHAT_APP_SECRET=ci-app-secret \
            quzijie-api:ci
          test "$(docker exec "$container" node -e 'process.stdout.write(String(process.getuid()))')" != "0"
          ready=0
          for attempt in $(seq 1 20); do
            if curl --silent --fail http://127.0.0.1:3000/health; then
              ready=1
              break
            fi
            test "$(docker inspect --format '{{.State.Running}}' "$container")" = "true"
            sleep 1
          done
          test "$ready" = "1"
          curl --fail http://127.0.0.1:3000/ready
          QUIZIJIE_ALLOW_HTTP_CHECK=true node tools/verify-deployment.js http://127.0.0.1:3000
          docker stop --time 10 "$container"
          test "$(docker inspect --format '{{.State.ExitCode}}' "$container")" = "0"
          docker rm "$container"
          trap - EXIT
      - name: Smoke production compose
        run: |
          set -euo pipefail
          release_env="$RUNNER_TEMP/quzijie-release.env"
          printf '%s\n' \
            'NODE_ENV=production' \
            'HOST=0.0.0.0' \
            'PORT=3000' \
            'DATABASE_URL=postgresql://quzijie:Ci-Db-74_Battery@host.docker.internal:5432/quzijie_dev?schema=public' \
            'JWT_ACCESS_SECRET=ci-production-secret-with-more-than-thirty-two-unique-characters' \
            'WECHAT_AUTH_MODE=real' \
            'WECHAT_APP_ID=wx69380e593ebd5ac7' \
            'WECHAT_APP_SECRET=ci-app-secret' > "$release_env"
          chmod 600 "$release_env"
          export QUIZIJIE_API_ENV_FILE="$release_env"
          export QUIZIJIE_API_IMAGE=quzijie-api:ci
          export QUIZIJIE_MIGRATE_IMAGE=quzijie-api-migrate:ci
          export QUIZIJIE_API_PORT=3010
          cleanup() { docker compose -f compose.release.yaml down --remove-orphans >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          node tools/check-deployment-env.js "$release_env"
          docker compose -f compose.release.yaml up -d --no-build api
          ready=0
          for attempt in $(seq 1 30); do
            if QUIZIJIE_ALLOW_HTTP_CHECK=true node tools/verify-deployment.js http://127.0.0.1:3010; then
              ready=1
              break
            fi
            sleep 1
          done
          test "$ready" = "1"
          test "$(docker compose -f compose.release.yaml exec -T api node -e 'process.stdout.write(String(process.getuid()))')" != "0"
          container_id="$(docker compose -f compose.release.yaml ps -q api)"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$container_id")" = "true"
          docker inspect --format '{{json .HostConfig.SecurityOpt}}' "$container_id" | grep -q 'no-new-privileges'
          cleanup
          trap - EXIT
