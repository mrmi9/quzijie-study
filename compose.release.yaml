name: quzijie-study-api

x-service-base: &service-base
  env_file:
    - ${QUIZIJIE_API_ENV_FILE:?set QUIZIJIE_API_ENV_FILE}
  environment:
    NODE_ENV: production
    QUESTION_CONTENT_DIR: /app/content
  init: true
  read_only: true
  tmpfs:
    - /tmp:size=16m,mode=1777
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  extra_hosts:
    - "host.docker.internal:host-gateway"
  logging:
    driver: local
    options:
      max-size: 10m
      max-file: "5"

services:
  migrate:
    <<: *service-base
    profiles: ["tools"]
    image: ${QUIZIJIE_MIGRATE_IMAGE:?set QUIZIJIE_MIGRATE_IMAGE}
    restart: "no"

  api:
    <<: *service-base
    image: ${QUIZIJIE_API_IMAGE:?set QUIZIJIE_API_IMAGE}
    restart: unless-stopped
    stop_grace_period: 20s
    environment:
      NODE_ENV: production
      HOST: 0.0.0.0
      PORT: 3000
      QUESTION_CONTENT_DIR: /app/content
    ports:
      - "127.0.0.1:${QUIZIJIE_API_PORT:-3000}:3000"
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/ready').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
